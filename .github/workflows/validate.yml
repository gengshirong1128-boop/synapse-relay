name: Validate Synapse Relay

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            内阁-ai-app/package-lock.json
            desktop/package-lock.json
      - run: pip install -r requirements.txt
      - run: npm ci --prefix 内阁-ai-app
      - run: npm ci --prefix desktop
      - run: npm audit --audit-level=high --registry=https://registry.npmjs.org --prefix 内阁-ai-app
      - run: npm audit --audit-level=high --registry=https://registry.npmjs.org --prefix desktop
      - run: python -m pytest backend/tests -q
      - run: npm run lint --prefix 内阁-ai-app
      - run: npm run build --prefix 内阁-ai-app
      - run: npm run validate
      - run: python scripts/validate_secret_scan.py
