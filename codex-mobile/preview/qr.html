<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan to Open in Expo Go</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#1a1a2e;color:#fff;font-family:system-ui}
h1{font-size:24px;margin-bottom:8px}
p{color:#aaa;margin-bottom:24px}
canvas{border-radius:12px;background:#fff;padding:16px}
a{display:block;margin-top:16px;color:#fff;background:#4f46e5;padding:10px 16px;border-radius:8px;text-decoration:none;font-weight:600}
code{display:block;margin-top:12px;background:#2d2d44;padding:8px 16px;border-radius:6px;font-size:14px}
</style>
</head>
<body>
<h1>CodexMobile</h1>
<p>用手机扫码直接打开 Expo Go</p>
<canvas id="qr"></canvas>
<a id="openLink" href="exp://bonpq18-anonymous-8083.exp.direct:443">打开 Expo Go</a>
<code>exp://bonpq18-anonymous-8083.exp.direct:443</code>
<script>
const expoUrl = 'exp://bonpq18-anonymous-8083.exp.direct:443';
document.getElementById('openLink').href = expoUrl;
QRCode.toCanvas(document.getElementById('qr'), expoUrl, {width:280,margin:2});
</script>
</body>
</html>
